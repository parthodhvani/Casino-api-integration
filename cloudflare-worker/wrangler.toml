name = "jackpot-worker"
main = "worker.js"
compatibility_date = "2026-01-01"

# List of WordPress sites to fan out to (JSON).
# Start with ONE site for testing, then add the other two.
#
# Each site: { "name": "...", "url": "...", "secret": "..."(optional) }
#   - If "secret" is omitted, the Worker uses the shared JACKPOT_SECRET.
#   - Give a site its own "secret" only if you want per-site isolation.
[vars]
WP_SITES = '[{"name":"berck","url":"https://casinoberck.fr/wp-json/jackpot/v1/update"}]'

# Optional tuning for the WordPress fan-out (safe defaults shown):
#   FORWARD_RETRIES     - retries on network error / 5xx (default 2)
#   FORWARD_TIMEOUT_MS  - per-request timeout in ms (default 8000)
FORWARD_RETRIES = "2"
FORWARD_TIMEOUT_MS = "8000"

# Base URL of the Node MQTT listener control API (no trailing slash).
# Example: https://listener.example.com:3099  or  http://10.0.0.5:3099
LISTENER_CONTROL_URL = "http://127.0.0.1:3099"

# Optional control proxy timeout (ms)
CONTROL_TIMEOUT_MS = "8000"

# Secrets are NOT stored here. Set them in the Cloudflare Dashboard:
#   Settings → Variables → Secrets
#     LISTENER_SECRET
#     JACKPOT_SECRET
#
# Dashboard paste deploy (no Wrangler):
#   Workers & Pages → your worker → Edit Code → paste worker.js
